server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**, /api/users/**
        - id: trip-service
          uri: lb://trip-service
          predicates:
            - Path=/api/trips/**
        - id: stops-service
          uri: lb://stops-service
          predicates:
            - Path=/api/stops/**
        - id: subscription-service
          uri: lb://subscription-service
          predicates:
            - Path=/api/subscriptions/**
        - id: groups-service
          uri: lb://groups-service
          predicates:
            - Path=/api/groups/**
        - id: stats-service
          uri: lb://stats-service
          predicates:
            - Path=/api/stats/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-minimum-256-bits}

# Rutas públicas (sin JWT requerido)
routeit:
  gateway:
    public-paths:
      - /api/auth/register
      - /api/auth/login
      - /api/auth/activate
      - /api/auth/refresh

management:
  endpoints:
    web:
      exposure:
        include: health,info
