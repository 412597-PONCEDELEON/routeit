services:

  # ─── Base de datos ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: routeit-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (object storage para fotos) ───────────────────────────
  minio:
    image: minio/minio:latest
    container_name: routeit-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Infraestructura Spring Cloud ────────────────────────────────
  discovery-server:
    build:
      context: ..
      dockerfile: services/discovery-server/Dockerfile
    container_name: routeit-discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  config-server:
    build:
      context: ..
      dockerfile: services/config-server/Dockerfile
    container_name: routeit-config
    ports:
      - "8888:8888"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    container_name: routeit-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka
      CONFIG_URL: http://config-server:8888
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      config-server:
        condition: service_healthy

  # ─── Microservicios de negocio ────────────────────────────────────
  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    container_name: routeit-user
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=users_schema
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_URL: http://discovery-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  trip-service:
    build:
      context: ..
      dockerfile: services/trip-service/Dockerfile
    container_name: routeit-trip
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=trips_schema
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_URL: http://discovery-server:8761/eureka
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  stops-service:
    build:
      context: ..
      dockerfile: services/stops-service/Dockerfile
    container_name: routeit-stops
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=stops_schema
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_URL: http://discovery-server:8761/eureka
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  subscription-service:
    build:
      context: ..
      dockerfile: services/subscription-service/Dockerfile
    container_name: routeit-subscription
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=subscriptions_schema
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_URL: http://discovery-server:8761/eureka
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  groups-service:
    build:
      context: ..
      dockerfile: services/groups-service/Dockerfile
    container_name: routeit-groups
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=groups_schema
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_URL: http://discovery-server:8761/eureka
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      config-server:
        condition: service_healthy

  stats-service:
    build:
      context: ..
      dockerfile: services/stats-service/Dockerfile
    container_name: routeit-stats
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=stats_schema
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_URL: http://discovery-server:8761/eureka
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
